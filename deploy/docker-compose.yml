# Production stack for the home server (Watchtower pulls from Docker Hub).
# Copy deploy/env.backend.example → deploy/.env and fill secrets before `docker compose up -d`.
#
# Cloudflare Tunnel (Zero Trust) public hostnames (suggested):
#   signals.swifttrade.app  → http://localhost:8010
#   swifttrade.app          → http://localhost:3000  (if self-hosting web; Pages is lighter)

services:
  backend:
    image: ${SWIFTTRADE_BACKEND_IMAGE:-veski4a06/swifttrade-backend:latest}
    container_name: swifttrade_backend
    restart: always
    ports:
      - "${BACKEND_HOST_PORT:-8010}:8010"
    env_file:
      - .env
    environment:
      RUN_DB_MIGRATIONS: ${RUN_DB_MIGRATIONS:-false}
      RUN_STRATEGY: ${RUN_STRATEGY:-false}
      DEBUG_ROUTES_ENABLED: ${DEBUG_ROUTES_ENABLED:-false}
      APP_BASE_URL: ${APP_BASE_URL:-https://signals.swifttrade.app}
    volumes:
      - swifttrade_bot_state:/app/Server-App/t212_miner_bot/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # ── Autonomous live trader (Mode 2) ────────────────────────────────────────
  # Runs the ML strategy directly on the server and places orders on Trading212
  # WITHOUT needing the desktop app connected.
  #
  # ⚠️  DO NOT enable this while RUN_STRATEGY=true AND the desktop app is
  #     connected — both would trade the same signals, causing double orders.
  #
  # Start with demo first:
  #   T212_BASE_URL=https://demo.trading212.com
  # Switch to live when satisfied:
  #   T212_BASE_URL=https://live.trading212.com
  #
  # Enable with:  docker compose --profile trader up -d
  # Disable with: docker compose --profile trader down
  live_trader:
    image: ${SWIFTTRADE_BACKEND_IMAGE:-veski4a06/swifttrade-backend:latest}
    container_name: swifttrade_live_trader
    restart: always
    profiles: ["trader"]
    command: ["python", "-m", "t212_miner_bot.live_trader"]
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/Server-App
      T212_API_KEY: ${T212_API_KEY:-}
      T212_SECRET_KEY: ${T212_SECRET_KEY:-}
      T212_BASE_URL: ${T212_BASE_URL:-https://demo.trading212.com}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      BOT_COLORS: "0"
    volumes:
      - swifttrade_bot_state:/app/Server-App/t212_miner_bot/models

  # Optional: self-host the Next.js portal on the same machine.
  # Prefer Cloudflare Pages for swifttrade.app if the server CPU is tight.
  web:
    image: ${SWIFTTRADE_WEB_IMAGE:-veski4a06/swifttrade-web:latest}
    container_name: swifttrade_web
    restart: always
    profiles: ["web"]
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    env_file:
      - .env.web
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"

volumes:
  swifttrade_bot_state:
