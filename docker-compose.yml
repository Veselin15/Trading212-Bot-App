services:
  postgres:
    image: postgres:16
    container_name: t212_bot_postgres
    environment:
      POSTGRES_DB: t212_bot
      POSTGRES_USER: t212_bot
      POSTGRES_PASSWORD: t212_bot
    ports:
      - "5432:5432"
    volumes:
      - t212_bot_pgdata:/var/lib/postgresql/data

volumes:
  t212_bot_pgdata:
